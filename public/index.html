<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener | CodeAlpha</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e2e8f0;
      padding: 1rem;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 40px rgba(0,0,0,.3);
    }
    h1 { font-size: 1.5rem; margin-bottom: .25rem; }
    p.sub { color: #94a3b8; margin-bottom: 1.5rem; font-size: .9rem; }
    form { display: flex; gap: .5rem; margin-bottom: 1rem; }
    input {
      flex: 1;
      padding: .75rem 1rem;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
    }
    button {
      padding: .75rem 1.25rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #2563eb; }
    .result {
      background: #0f172a;
      border-radius: 8px;
      padding: 1rem;
      display: none;
    }
    .result.show { display: block; }
    .result a { color: #60a5fa; word-break: break-all; }
    .error { color: #f87171; margin-top: .5rem; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>URL Shortener</h1>
    <p class="sub">CodeAlpha Task 1 — paste a long URL to get a short link</p>
    <form id="form">
      <input type="url" id="url" placeholder="https://example.com/very/long/url" required>
      <button type="submit">Shorten</button>
    </form>
    <div id="result" class="result">
      <p><strong>Short URL:</strong> <a id="shortLink" href="#" target="_blank"></a></p>
      <p style="margin-top:.5rem;color:#94a3b8;font-size:.85rem">Original: <span id="original"></span></p>
    </div>
    <p id="error" class="error"></p>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      const resultEl = document.getElementById('result');
      errorEl.textContent = '';
      resultEl.classList.remove('show');

      const url = document.getElementById('url').value;
      try {
        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to shorten URL');

        document.getElementById('shortLink').textContent = data.shortUrl;
        document.getElementById('shortLink').href = data.shortUrl;
        document.getElementById('original').textContent = data.originalUrl;
        resultEl.classList.add('show');
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
